# CloudFormation template (commented to test line accuracy)
AWSTemplateFormatVersion: "2010-09-09"

Resources:

  # comment before the bucket
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketNameParam
      AccessControl: PublicRead

  MySG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: open ssh
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
