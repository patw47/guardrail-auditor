name: CI

on:
  push:
  pull_request:

jobs:
  ladder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (pyproject is the single source of truth)
        run: pip install -e ".[dev]"
      - name: L1 lint
        run: ruff check .
      - name: L1 type-check
        run: mypy .
      - name: L1 tests
        run: pytest -q
